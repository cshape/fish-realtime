<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Fish Audio Voice Agents</title>
  <meta name="description" content="Talk to a live voice agent built on Fish Audio. Interrupt it mid-sentence, swap personas with a tap — all in realtime." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@200;300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/favicon-16x16.png" type="image/png" sizes="16x16" />
  <link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32" />
  <link rel="icon" href="/favicon-96x96.png" type="image/png" sizes="96x96" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
</head>
<body class="idle">
  <canvas id="scene" aria-hidden="true"></canvas>

  <div id="app">
    <header>
      <a class="brand" href="https://fish.audio" target="_blank" rel="noopener">
        <svg class="mark" viewBox="24 164 464 170" aria-hidden="true">
          <g class="mark-main">
            <rect x="38.1" y="200" width="16" height="19.4" rx="8"/><rect x="71" y="202.7" width="16" height="30.7" rx="8"/><rect x="103.9" y="198.4" width="16" height="77.4" rx="8"/><rect x="136.9" y="192" width="16" height="20" rx="8"/><rect x="136.9" y="245.4" width="16" height="58.3" rx="8"/><rect x="168.6" y="235.1" width="16" height="100.8" rx="8"/><rect x="200.6" y="222.4" width="16" height="102.2" rx="8"/><rect x="232.6" y="204.1" width="16" height="115.8" rx="8"/><rect x="264.5" y="190.2" width="16" height="120.1" rx="8"/><rect x="297.1" y="181.9" width="16" height="107.1" rx="8"/><rect x="328.9" y="177" width="16" height="87.8" rx="8"/><rect x="360.9" y="175" width="16" height="86.6" rx="8"/><rect x="392.9" y="178.1" width="16" height="75.4" rx="8"/><rect x="424.7" y="185.2" width="16" height="60.2" rx="8"/><rect x="456.7" y="204.1" width="16" height="38" rx="8"/>
          </g>
          <g class="mark-accent">
            <rect x="297.1" y="299.3" width="16" height="21.4" rx="8"/><rect x="328.9" y="276.4" width="16" height="46" rx="8"/><rect x="360.9" y="270.7" width="16" height="51.6" rx="8"/><rect x="392.9" y="264.3" width="16" height="52.1" rx="8"/><rect x="424.7" y="256.6" width="16" height="47.4" rx="8"/><rect x="456.7" y="249.9" width="16" height="27.1" rx="8"/>
          </g>
        </svg>
        <span class="brand-name">Fish&nbsp;Audio</span>
      </a>
      <span id="latency" class="mono"></span>
    </header>

    <main>
      <div id="dock">
        <button id="orb" class="idle" aria-label="Start talking">
          <span class="orb-ring" aria-hidden="true"></span>
        </button>
        <button id="mute" class="session-action" type="button" aria-label="Mute microphone" aria-pressed="false">
          <span id="mute-label">Mute</span>
        </button>
        <nav id="personas" aria-label="Personas"></nav>
      </div>
    </main>

  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
